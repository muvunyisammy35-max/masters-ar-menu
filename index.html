<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Master's Pizza AR</title>

  <script type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js">
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
    }

    h1 {
      margin-top: 20px;
    }

    model-viewer {
      width: 100%;
      height: 70vh;
    }

    button {
      padding: 12px 18px;
      font-size: 16px;
      margin-top: 10px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h1>🍕 Master’s Pizza</h1>

<p>Weekend Deal: Buy 2 Get 1 Free 🎉</p>

<model-viewer
  src="https://modelviewer.dev/shared-assets/models/DamagedHelmet.glb"
  camera-controls
  auto-rotate
  ar
  shadow-intensity="1">
</model-viewer>

<h2>Chicken Supreme</h2>

<button onclick="document.querySelector('model-viewer').activateAR()">
  View in AR 📱
</button>

<p>Tag your pizza squad 🍕❤️</p>

</body>
